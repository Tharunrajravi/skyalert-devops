services:

  # 🌐 React Frontend
  frontend:
    build: ./frontend
    container_name: skyalert-frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    depends_on:
      - backend

  # 🧠 Flask Backend API
  backend:
    build: ./backend
    container_name: skyalert-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app        # ⭐ SHARE DATABASE + CODE
    restart: unless-stopped

  # ⏰ Weather Worker (email sender)
  worker:
    build: ./backend
    container_name: skyalert-worker
    command: python worker.py
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app        # ⭐ SAME SHARED STORAGE
    depends_on:
      - backend
    restart: unless-stopped
